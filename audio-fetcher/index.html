<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ॐ नमः शिवाय - Mantra Meditation</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0d0d1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 215, 0, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            max-width: 450px;
            width: 95%;
        }

        .album-art {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            border-radius: 50%;
            overflow: hidden;
            box-shadow:
                0 0 60px rgba(255, 215, 0, 0.3),
                0 0 100px rgba(138, 43, 226, 0.2);
            animation: glow 3s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from {
                box-shadow: 0 0 60px rgba(255, 215, 0, 0.3), 0 0 100px rgba(138, 43, 226, 0.2);
            }

            to {
                box-shadow: 0 0 80px rgba(255, 215, 0, 0.5), 0 0 120px rgba(138, 43, 226, 0.4);
            }
        }

        .album-art.playing {
            animation: glow 3s ease-in-out infinite alternate, spin 20s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .album-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .om-symbol {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            color: rgba(255, 215, 0, 0.8);
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 5px;
            background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to {
                background-position: 200% center;
            }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            font-weight: 300;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .audio-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.3);
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 50px rgba(255, 215, 0, 0.5);
        }

        .side-btn {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .side-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 215, 0, 0.5);
        }

        .progress-container {
            width: 100%;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            width: 0%;
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .time-display {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 8px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: #ffd700;
            border-radius: 50%;
            cursor: pointer;
        }

        .status {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: none;
        }

        .status.loading {
            display: inline-block;
            background: rgba(255, 215, 0, 0.1);
            color: #ffd700;
        }

        .status.success {
            display: inline-block;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
        }

        .status.error {
            display: inline-block;
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid currentColor;
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinLoader 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spinLoader {
            to {
                transform: rotate(360deg);
            }
        }

        .visualizer {
            display: flex;
            justify-content: center;
            gap: 4px;
            height: 30px;
            align-items: flex-end;
            margin-top: 20px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 4px;
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            border-radius: 2px;
        }

        .visualizer.active .bar {
            animation: visualize 0.5s ease-in-out infinite alternate;
        }

        @keyframes visualize {
            from {
                height: 5px;
            }

            to {
                height: 25px;
            }
        }

        .bar:nth-child(1) {
            animation-delay: 0s;
        }

        .bar:nth-child(2) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(3) {
            animation-delay: 0.2s;
        }

        .bar:nth-child(4) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(5) {
            animation-delay: 0.3s;
        }

        .bar:nth-child(6) {
            animation-delay: 0.2s;
        }

        .bar:nth-child(7) {
            animation-delay: 0s;
        }

        .bar:nth-child(8) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(9) {
            animation-delay: 0.2s;
        }
    </style>
</head>

<body>
    <div class="bg-particles" id="particles"></div>

    <div class="container">
        <div class="album-art" id="albumArt">
            <img src="shiva_meditation.webp" alt="Om Namah Shivaya"
                onerror="this.style.display='none'; document.querySelector('.om-symbol').style.display='block';">
            <div class="om-symbol" style="display: none;">ॐ</div>
        </div>

        <h1>ॐ नमः शिवाय</h1>
        <p class="subtitle">MANTRA MEDITATION</p>

        <div class="audio-controls">
            <button class="side-btn" onclick="skip(-10)">⏪</button>
            <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
            <button class="side-btn" onclick="skip(10)">⏩</button>
        </div>

        <div class="progress-container">
            <div class="progress-bar" onclick="seek(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
                <span id="currentTime">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="volume-container">
            <span>🔊</span>
            <input type="range" class="volume-slider" min="0" max="1" step="0.1" value="0.7"
                oninput="audio.volume=this.value">
        </div>

        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="status" id="status"></div>
    </div>

    <audio id="audio" preload="metadata"></audio>

    <script>
        // Use proxy server endpoint for audio
        const AUDIO_URL = '/audio';

        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const albumArt = document.getElementById('albumArt');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const visualizer = document.getElementById('visualizer');
        const statusEl = document.getElementById('status');

        // Set audio source from proxy
        audio.src = AUDIO_URL;
        audio.volume = 0.7;

        // Create particles
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.animationDuration = (10 + Math.random() * 10) + 's';
                p.style.animationDelay = Math.random() * 10 + 's';
                container.appendChild(p);
            }
        })();

        function showStatus(msg, type) {
            statusEl.className = `status ${type}`;
            statusEl.innerHTML = type === 'loading' ? `<span class="loader"></span>${msg}` : msg;
        }

        function hideStatus() { statusEl.className = 'status'; }

        function formatTime(s) {
            if (isNaN(s)) return '0:00';
            return `${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, '0')}`;
        }

        function togglePlay() {
            if (audio.paused) {
                showStatus('Loading from proxy...', 'loading');
                audio.play().then(hideStatus).catch(e => showStatus('Error: ' + e.message, 'error'));
            } else {
                audio.pause();
            }
        }

        function skip(sec) {
            audio.currentTime = Math.max(0, Math.min(audio.currentTime + sec, audio.duration || 0));
        }

        function seek(e) {
            const pct = e.offsetX / e.currentTarget.offsetWidth;
            audio.currentTime = pct * audio.duration;
        }

        audio.addEventListener('play', () => {
            playBtn.textContent = '⏸';
            albumArt.classList.add('playing');
            visualizer.classList.add('active');
        });

        audio.addEventListener('pause', () => {
            playBtn.textContent = '▶';
            albumArt.classList.remove('playing');
            visualizer.classList.remove('active');
        });

        audio.addEventListener('timeupdate', () => {
            progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });

        audio.addEventListener('loadedmetadata', () => {
            durationEl.textContent = formatTime(audio.duration);
            showStatus('Ready to play ✓', 'success');
            setTimeout(hideStatus, 2000);
        });

        audio.addEventListener('ended', () => {
            playBtn.textContent = '▶';
            albumArt.classList.remove('playing');
            visualizer.classList.remove('active');
            progressFill.style.width = '0%';
        });

        audio.addEventListener('error', () => showStatus('Error loading audio', 'error'));
    </script>
</body>

</html>
